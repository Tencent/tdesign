<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <title>TDesign Theme Generator</title>
    <style>
      /* dev 用的深浅色切换按钮，不进入构建产物 */
      #dev-mode-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 10000;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--td-border-level-2, #e7e7e7);
        background: var(--td-bg-color-container, #fff);
        color: var(--td-text-primary, #333);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      /* body 背景跟随 theme-mode 适配 */
      body {
        margin: 0;
        background: var(--td-bg-color-page, #f5f5f5);
        transition: background-color 0.3s ease;
      }
      :root[theme-mode='dark'] body {
        background: var(--td-bg-color-page, #181818);
      }
    </style>
  </head>
  <body>
    <!-- dev 也走 Web Component 路径，与 build 产物行为一致（shadowRoot 隔离） -->
    <td-theme-generator></td-theme-generator>
    <!-- dev 用的深浅色切换按钮：切换 documentElement 的 theme-mode 属性，
         Generator.vue 中的 syncModeToGenerator 会自动同步给 Web Component -->
    <button id="dev-mode-toggle" title="切换深浅色模式" aria-label="切换深浅色模式">🌙</button>
    <script type="module" src="/src/wc-entry.js"></script>
    <script type="module">
      const toggle = document.getElementById('dev-mode-toggle');
      const root = document.documentElement;
      const render = () => {
        const isDark = root.getAttribute('theme-mode') === 'dark';
        toggle.textContent = isDark ? '☀️' : '🌙';
      };
      toggle.addEventListener('click', () => {
        const isDark = root.getAttribute('theme-mode') === 'dark';
        root.setAttribute('theme-mode', isDark ? 'light' : 'dark');
      });
      // 跟随外部属性变化刷新按钮文案
      new MutationObserver(render).observe(root, { attributes: true, attributeFilter: ['theme-mode'] });
      render();
    </script>
  </body>
</html>
